<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵签求问 · 玄境沉浸式抽签</title>
<meta name="description" content="沉浸式灵签求问，一事一问，静心摇签，签出即止，得签后观诗、释义与行事建议。">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect x='38' y='10' width='20' height='72' rx='6' fill='%23c7954b'/%3E%3Cpath d='M48 18v56M42 30h12M42 44h12' stroke='%2305080a' stroke-width='4'/%3E%3C/svg%3E">
<style>
:root{
  --void:#05080a;
  --deep:#071016;
  --panel:rgba(8,18,24,.72);
  --panel-strong:rgba(6,12,16,.9);
  --gold:#c7954b;
  --gold-hi:#f2d58f;
  --gold-soft:rgba(199,149,75,.55);
  --line:rgba(213,165,87,.42);
  --ink:#f4e7ca;
  --ink-2:#d6c198;
  --muted:#9d8a65;
  --red:#8f2f25;
  --green:#8fae76;
  --blue:#5a8ea7;
  --shadow:0 16px 44px rgba(0,0,0,.26);
  --font-serif:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
  --font-display:"STKaiti","KaiTi","Noto Serif SC",serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{
  overflow:hidden;
  color:var(--ink);
  background:var(--void);
  font-family:var(--font-serif);
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
button,input{font:inherit}
button{border:0;color:inherit;background:transparent;cursor:pointer}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

#bg,#vwrap,#veil,#grain,#flash{position:fixed;inset:0}
#bg{
  z-index:0;
  background:
    linear-gradient(90deg,rgba(0,0,0,.34),rgba(0,0,0,.02) 38%,rgba(0,0,0,.06) 64%,rgba(0,0,0,.38)),
    linear-gradient(180deg,rgba(2,6,8,.02),rgba(2,6,8,.42)),
    url("assets/lingqian/bg.png") center/cover no-repeat;
  transform:scale(1.012);
  transition:filter 1s ease, transform 8s ease;
}
body:not([data-stage="home"]) #bg{filter:saturate(1.08) brightness(.78);transform:scale(1.04)}
#vwrap{z-index:1;overflow:hidden;pointer-events:none}
#vwrap video{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  opacity:0;filter:saturate(1.05) contrast(1.02);
  transition:opacity 1.1s ease,filter .8s ease;
}
#vwrap video.on{opacity:1}
#vwrap video.dim{filter:saturate(.95) brightness(.7)}
#veil{
  z-index:2;pointer-events:none;
  background:
    radial-gradient(900px 520px at 50% 44%,rgba(255,190,91,.12),transparent 70%),
    linear-gradient(180deg,rgba(2,6,8,.02),rgba(2,6,8,.42));
}
#grain{
  z-index:3;pointer-events:none;opacity:.08;mix-blend-mode:screen;
  background-image:
    radial-gradient(circle at 24% 18%,rgba(255,255,255,.5) 0 1px,transparent 1.8px),
    radial-gradient(circle at 78% 12%,rgba(242,213,143,.45) 0 1px,transparent 1.6px),
    radial-gradient(circle at 32% 78%,rgba(255,255,255,.28) 0 1px,transparent 1.8px);
  background-size:260px 260px,360px 360px,420px 420px;
  animation:grainDrift 90s linear infinite;
}
@keyframes grainDrift{to{transform:translate3d(120px,-90px,0)}}
#flash{z-index:40;pointer-events:none;opacity:0;background:radial-gradient(circle,rgba(255,239,190,.92),rgba(255,211,124,.25) 32%,transparent 68%);transition:opacity .7s ease}
#flash.on{opacity:1}

.topbar{
  position:fixed;z-index:10;top:0;left:0;right:0;height:clamp(72px,7.94vh,76px);
  display:grid;grid-template-columns:250px 1fr 250px;align-items:center;
  padding:0 clamp(30px,1.85vw,38px);border-bottom:1px solid rgba(199,149,75,.42);
  background:rgba(3,8,11,.68);
  backdrop-filter:blur(10px);
  transition:opacity .75s ease,transform .75s ease;
}
.project{position:relative;justify-self:start}
.project-btn{
  min-width:clamp(174px,10.36vw,204px);height:clamp(46px,4.98vh,52px);padding:0 22px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  color:var(--gold-hi);letter-spacing:.08em;
  border:1px solid rgba(199,149,75,.58);background:rgba(3,9,12,.5);
  box-shadow:none;
  position:relative;
}
.project-btn::before,.project-btn::after,.panel::before,.panel::after{
  content:"";position:absolute;width:16px;height:16px;border-color:var(--gold);opacity:.9;
}
.project-btn::before{left:4px;top:4px;border-left:1px solid;border-top:1px solid}
.project-btn::after{right:4px;bottom:4px;border-right:1px solid;border-bottom:1px solid}
.caret{width:8px;height:8px;border-right:1px solid var(--gold-hi);border-bottom:1px solid var(--gold-hi);transform:rotate(45deg);transition:transform .25s}
.project.open .caret{transform:rotate(225deg);margin-top:8px}
.project-menu{
  position:absolute;top:54px;left:0;width:218px;padding:8px;
  border:1px solid var(--line);background:rgba(4,11,14,.95);
  box-shadow:var(--shadow);opacity:0;transform:translateY(-8px);pointer-events:none;
  transition:.25s ease;
}
.project.open .project-menu{opacity:1;transform:none;pointer-events:auto}
.project-menu a,.project-menu button{
  width:100%;height:38px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;
  color:var(--ink-2);text-decoration:none;border-bottom:1px solid rgba(199,149,75,.1);
}
.project-menu a:hover,.project-menu button:hover,.project-menu .cur{color:var(--gold-hi);background:rgba(199,149,75,.08)}
.nav{display:flex;align-items:center;justify-content:center;gap:min(3.2vw,58px);height:100%}
.nav [data-nav="service"]{margin-right:min(26vw,450px)}
.nav button,.nav a{
  color:var(--gold-hi);text-decoration:none;font-weight:600;letter-spacing:.14em;font-size:17px;
  text-shadow:none;
}
.brand{
  position:absolute;left:50%;top:12px;transform:translateX(-50%);
  display:flex;align-items:center;gap:22px;
  font-family:var(--font-display);font-size:37px;letter-spacing:.22em;color:var(--gold-hi);
  text-shadow:0 0 16px rgba(242,213,143,.28);
  pointer-events:none;
}
.brand i{width:86px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);position:relative}
.brand i::after{content:"";position:absolute;left:50%;top:50%;width:8px;height:8px;background:var(--gold-hi);transform:translate(-50%,-50%) rotate(45deg);box-shadow:0 0 12px rgba(242,213,143,.58)}
.actions{justify-self:end;display:flex;gap:16px}
.icon-btn{
  width:46px;height:46px;border:1px solid var(--line);border-radius:50%;
  display:grid;place-items:center;color:var(--gold-hi);background:rgba(3,9,12,.56);
  box-shadow:none;
}
.icon-btn svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.6}
.icon-btn.off{color:var(--muted);opacity:.65}

.home-ui{transition:opacity .85s ease,transform .85s ease,filter .85s ease}
body:not([data-stage="home"]) .home-ui{
  opacity:0;pointer-events:none;filter:blur(4px);transform:translateY(-12px);
}
.side-rail{
  position:fixed;z-index:8;left:2.14vw;top:12.38vh;width:8.4vw;height:49.42vh;
  min-width:136px;max-width:178px;min-height:444px;max-height:468px;
  padding:clamp(18px,2.1vh,24px) 14px;display:flex;flex-direction:column;justify-content:space-between;
  border:1px solid rgba(199,149,75,.62);background:rgba(5,14,18,.58);
  box-shadow:var(--shadow);
  backdrop-filter:blur(5px);
}
.side-rail::before,.side-rail::after{content:"";position:absolute;inset:10px;border:1px solid rgba(199,149,75,.24);pointer-events:none}
.rail-item{
  height:clamp(66px,7.85vh,74px);display:grid;grid-template-columns:42px 1fr;align-items:center;gap:8px;
  color:var(--gold-hi);font-size:18px;font-weight:700;letter-spacing:.08em;position:relative;
}
.rail-item svg{width:31px;height:31px;stroke:var(--gold);fill:none;stroke-width:1.35}
.rail-item.cur::before{
  content:"";position:absolute;inset:0;border:1px solid rgba(242,213,143,.5);
  box-shadow:inset 0 0 22px rgba(199,149,75,.08);
}
.steps-card{
  position:fixed;z-index:7;left:14.23vw;top:13.33vh;width:15.6vw;height:47.1vh;
  min-width:252px;max-width:326px;min-height:424px;max-height:470px;
  padding:clamp(23px,2.85vh,30px) clamp(22px,1.72vw,32px);
}
.panel{
  border:1px solid rgba(199,149,75,.58);
  background:
    radial-gradient(circle at 50% 0,rgba(199,149,75,.08),transparent 38%),
    rgba(6,15,19,.58);
  box-shadow:var(--shadow),inset 0 0 32px rgba(199,149,75,.05);position:relative;
  backdrop-filter:blur(5px);
}
.panel::before{left:8px;top:8px;border-left:1px solid;border-top:1px solid}
.panel::after{right:8px;bottom:8px;border-right:1px solid;border-bottom:1px solid}
.panel-title{
  font-family:var(--font-display);font-size:clamp(24px,1.55vw,26px);letter-spacing:.14em;color:var(--gold-hi);
  text-align:center;margin-bottom:clamp(20px,2.45vh,24px);text-shadow:none;
}
.step-list{display:flex;flex-direction:column;gap:clamp(16px,2.65vh,24px)}
.step{
  display:grid;grid-template-columns:34px 42px 1fr;gap:12px;align-items:center;color:var(--ink-2);
}
.step-num{
  width:28px;height:28px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--gold);
  font-family:Georgia,serif;color:var(--gold-hi);font-size:15px;background:rgba(4,8,10,.75);
}
.step-ico{
  width:40px;height:40px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(199,149,75,.28);
}
.step-ico svg{width:24px;height:24px;stroke:var(--gold);fill:none;stroke-width:1.45}
.step strong{display:block;color:var(--gold-hi);font-size:18px;letter-spacing:.08em}
.step span{display:block;margin-top:4px;color:var(--ink-2);font-size:12px;line-height:1.5}
.right-stack{
  position:fixed;z-index:7;right:2.1vw;top:12.38vh;width:21.35vw;display:flex;flex-direction:column;gap:2.22vh;
  min-width:348px;max-width:438px;
}
.feature{
  height:16.1vh;min-height:146px;max-height:154px;
  padding:17px clamp(18px,1.35vw,24px);display:grid;grid-template-columns:clamp(88px,5.75vw,108px) 1fr 18px;align-items:center;gap:clamp(14px,1.1vw,20px);
}
.feature-art{
  width:clamp(88px,6vw,108px);height:clamp(88px,6vw,108px);border-radius:50%;border:1px solid rgba(199,149,75,.32);
  display:grid;place-items:center;background:rgba(199,149,75,.035);
}
.feature-art svg{width:clamp(52px,3.65vw,66px);height:clamp(52px,3.65vw,66px);stroke:var(--gold-hi);fill:none;stroke-width:1.28}
.feature h3{font-family:var(--font-display);font-size:clamp(25px,1.6vw,31px);letter-spacing:.11em;color:var(--gold-hi);margin-bottom:8px}
.feature p{font-size:clamp(14px,.86vw,16px);line-height:1.68;color:var(--ink-2)}
.feature .arrow{width:15px;height:15px;border-right:2px solid var(--gold);border-top:2px solid var(--gold);transform:rotate(45deg)}
.daily{
  position:fixed;z-index:7;left:2.14vw;top:66.88vh;width:23.45vw;height:20.1vh;
  min-width:390px;max-width:477px;min-height:172px;max-height:190px;
  padding:clamp(24px,2.9vh,30px) clamp(28px,2vw,38px);
}
.daily h3{font-family:var(--font-display);font-size:24px;color:var(--gold-hi);letter-spacing:.12em;margin-bottom:16px}
.daily p{font-size:19px;line-height:1.8;color:var(--ink)}
.daily .compass{position:absolute;right:26px;top:28px;width:94px;height:94px;border:1px solid rgba(199,149,75,.2);border-radius:50%;opacity:.58}
.daily .compass::before,.daily .compass::after{content:"";position:absolute;left:50%;top:12px;width:1px;height:70px;background:linear-gradient(var(--gold),transparent);transform-origin:50% 35px}
.daily .compass::after{transform:rotate(90deg)}
.start-plaque{
  position:fixed;z-index:7;right:2.1vw;top:68.2vh;width:22vw;height:10.2vh;
  min-width:360px;max-width:483px;min-height:84px;max-height:104px;
  display:grid;place-items:center;font-family:var(--font-display);font-size:clamp(35px,2.25vw,43px);letter-spacing:.22em;color:var(--gold-hi);
  border:1px solid rgba(242,213,143,.74);
  background:
    radial-gradient(circle at 50% 0,rgba(242,213,143,.2),transparent 45%),
    linear-gradient(180deg,rgba(82,52,24,.72),rgba(46,27,14,.72));
  box-shadow:0 0 28px rgba(242,213,143,.16),inset 0 0 30px rgba(242,213,143,.1);
  backdrop-filter:blur(5px);
}
.start-plaque::before,.start-plaque::after{
  content:"✦";position:absolute;top:50%;width:auto;height:auto;border:0;
  transform:translateY(-50%);font-size:20px;line-height:1;color:var(--gold-hi);
  text-shadow:0 0 14px rgba(242,213,143,.7);
}
.start-plaque::before{left:32px}
.start-plaque::after{right:32px}
.quote{
  position:fixed;z-index:7;right:3.55vw;top:83.2vh;width:22.5vw;height:6.4vh;
  min-width:340px;max-width:436px;min-height:50px;max-height:62px;
  display:flex;align-items:center;justify-content:center;color:var(--ink-2);font-size:18px;letter-spacing:.06em;
}
.quote::before{
  content:"“";position:absolute;left:26px;top:8px;
  font-family:Georgia,serif;font-size:28px;color:var(--gold-hi);opacity:.82;
}

#ritualDock{
  position:fixed;z-index:15;left:50%;bottom:34px;transform:translate(-50%,34px);
  width:min(980px,calc(100vw - 42px));padding:22px 28px 24px;
  opacity:0;pointer-events:none;transition:.7s ease;
}
body[data-stage="intro"] #ritualDock,
body[data-stage="vow"] #ritualDock,
body[data-stage="shake"] #ritualDock,
body[data-stage="climax"] #ritualDock{
  opacity:1;pointer-events:auto;transform:translate(-50%,0);
}
.dock-head{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:16px}
.dock-title{font-family:var(--font-display);font-size:27px;letter-spacing:.12em;color:var(--gold-hi)}
.dock-kicker{color:var(--muted);font-size:13px;letter-spacing:.08em}
.dock-body{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end}
.ritual-copy{font-size:18px;line-height:1.85;color:var(--ink)}
.ritual-copy .cursor{display:inline-block;width:1px;height:1.05em;background:var(--gold-hi);margin-left:3px;vertical-align:-.14em;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.dock-actions{display:flex;align-items:center;gap:12px;justify-content:flex-end;flex-wrap:wrap}
.gold-btn,.ghost-btn{
  min-height:43px;padding:0 20px;border:1px solid var(--line);letter-spacing:.08em;
  background:rgba(3,9,12,.58);color:var(--gold-hi);
}
.gold-btn{
  border-color:rgba(242,213,143,.7);
  background:linear-gradient(180deg,rgba(124,74,31,.72),rgba(57,33,16,.88));
  box-shadow:0 0 24px rgba(199,149,75,.22),inset 0 0 24px rgba(242,213,143,.12);
}
.ghost-btn:disabled,.gold-btn:disabled{opacity:.46;cursor:not-allowed}
.chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.chip{
  min-height:34px;padding:0 13px;border:1px solid rgba(199,149,75,.32);
  color:var(--ink-2);background:rgba(4,10,13,.55);letter-spacing:.04em;
}
.chip.sel{color:var(--gold-hi);border-color:rgba(242,213,143,.78);background:rgba(199,149,75,.16)}
.question-field{display:none;margin-top:16px}
body[data-stage="intro"] .question-field{display:block}
.question-field label{
  display:block;margin-bottom:8px;color:var(--gold-hi);font-size:14px;letter-spacing:.12em;
}
.question-field textarea{
  width:100%;min-height:78px;max-height:118px;resize:vertical;padding:12px 14px;
  border:1px solid rgba(199,149,75,.42);outline:none;background:rgba(3,9,12,.58);
  color:var(--ink);line-height:1.6;letter-spacing:.03em;
}
.question-field textarea:focus{
  border-color:rgba(242,213,143,.75);box-shadow:inset 0 0 20px rgba(199,149,75,.08);
}
.question-field textarea::placeholder{color:rgba(214,193,152,.52)}
.question-help{
  margin-top:7px;display:flex;justify-content:space-between;gap:12px;color:var(--muted);
  font-size:12px;letter-spacing:.06em;
}

#shakeStage{
  position:fixed;z-index:12;inset:112px 0 208px;display:grid;place-items:center;
  opacity:0;pointer-events:none;transition:opacity .7s ease;
}
body[data-stage="shake"] #shakeStage{opacity:1;pointer-events:auto}
.shake-orbit{position:relative;width:min(520px,82vw);height:min(520px,82vw);display:grid;place-items:center}
.shake-orbit::before{
  content:"";position:absolute;inset:28px;border-radius:50%;
  border:1px solid rgba(199,149,75,.18);box-shadow:0 0 80px rgba(199,149,75,.12);
  pointer-events:none;
}
.shake-orbit::after{
  content:"";position:absolute;inset:78px;border-radius:50%;border:1px dashed rgba(242,213,143,.25);
  animation:spin 18s linear infinite;
  pointer-events:none;
}
@keyframes spin{to{transform:rotate(360deg)}}
.tube{
  position:relative;width:158px;height:254px;transform-origin:50% 85%;
  filter:drop-shadow(0 22px 30px rgba(0,0,0,.45));
  touch-action:none;
  pointer-events:none;
  background:rgba(255,255,255,.001);
}
body[data-stage="shake"] .tube{pointer-events:auto}
.tube *{pointer-events:none}
.tube.shaking{animation:tubeShake .28s ease-in-out infinite}
@keyframes tubeShake{
  0%,100%{transform:rotate(-7deg) translateX(-2px)}
  50%{transform:rotate(9deg) translateX(4px)}
}
.tube-mouth{
  position:absolute;left:16px;top:10px;width:126px;height:42px;border-radius:50%;
  background:radial-gradient(ellipse at center,#493019 0 42%,#b77b34 43% 57%,#36210f 58%);
  border:1px solid rgba(242,213,143,.75);z-index:3;
}
.tube-body{
  position:absolute;left:24px;top:28px;width:110px;height:196px;border-radius:24px 24px 18px 18px;
  background:
    linear-gradient(90deg,rgba(38,22,10,.72),rgba(190,125,45,.92) 28%,rgba(227,169,81,.9) 48%,rgba(116,64,24,.9) 76%,rgba(35,20,10,.85)),
    repeating-linear-gradient(0deg,transparent 0 22px,rgba(64,30,12,.22) 22px 24px);
  border:1px solid rgba(242,213,143,.72);overflow:hidden;
}
.tube-body::before{
  content:"灵签";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  writing-mode:vertical-rl;font-family:var(--font-display);font-size:32px;color:#28190b;letter-spacing:.18em;
  text-shadow:0 1px rgba(242,213,143,.32);
}
.tube-base{
  position:absolute;left:16px;bottom:8px;width:126px;height:35px;border-radius:50%;
  background:linear-gradient(180deg,#d59b4f,#4c2e16);border:1px solid rgba(242,213,143,.65);
}
.sticks{position:absolute;left:44px;top:-34px;width:70px;height:98px;z-index:1}
.stick{
  position:absolute;bottom:0;left:31px;width:8px;height:100px;border-radius:6px 6px 2px 2px;
  background:linear-gradient(90deg,#6a3714,#e1b56b 46%,#845024);
  border:1px solid rgba(55,30,12,.55);transform-origin:50% 96%;
}
.stick:nth-child(1){transform:rotate(-26deg)}
.stick:nth-child(2){transform:rotate(-15deg)}
.stick:nth-child(3){transform:rotate(-5deg)}
.stick:nth-child(4){transform:rotate(8deg)}
.stick:nth-child(5){transform:rotate(20deg)}
.falling-sign{
  position:absolute;left:calc(50% - 12px);top:88px;width:24px;height:152px;border-radius:8px 8px 4px 4px;
  background:linear-gradient(90deg,#6a3714,#f2cf89 42%,#9a6428);
  border:1px solid rgba(242,213,143,.72);opacity:0;transform:translateY(-70px) rotate(0deg);z-index:5;
}
.falling-sign::before{
  content:attr(data-no);position:absolute;left:50%;top:18px;transform:translateX(-50%);
  writing-mode:vertical-rl;font-family:var(--font-display);font-size:15px;color:#2a1709;letter-spacing:.08em;
}
.falling-sign.drop{animation:dropSign 1.05s cubic-bezier(.16,.83,.25,1) forwards}
@keyframes dropSign{
  0%{opacity:0;transform:translateY(-72px) rotate(-8deg)}
  22%{opacity:1}
  100%{opacity:1;transform:translateY(202px) rotate(8deg)}
}
.meter{
  position:absolute;bottom:22px;left:50%;transform:translateX(-50%);width:min(360px,76vw);
}
.meter-label{display:flex;justify-content:space-between;color:var(--ink-2);font-size:13px;margin-bottom:8px;letter-spacing:.08em}

function buildSigns(){
  return SIGN_NAMES.map((name, i) => {
    const no = i + 1;
    const grade = GRADES[(i * 7 + 3) % GRADES.length];
    const season = ["春木","夏火","秋金","冬水","中土"][i % 5];
    const palace = ["青龙","朱雀","白虎","玄武","勾陈","腾蛇"][i % 6];
    return {
      no,
      name,
      grade: grade.name,
      tone: grade.tone,
      pace: grade.pace,
      element: season,
      palace,
      poem:[POEM_A[i%10],POEM_B[(i+2)%10],POEM_C[(i+4)%10],POEM_D[(i+6)%10]],
      meaning:`此签名为「${name}」，主${grade.tone}问事之人当先稳住心神，再分辨可为与不可为。${season}之气提示你：事情不是没有回应，而是需要按时序展开。`,
      story:`此象如行人入山，初见云雾，继而闻钟。钟声不替人走路，却能指出山门所在。你现在需要的不是多问一次，而是把已经出现的线索整理清楚。`,
      advice:`${grade.pace}凡遇催促、许诺、牵扯钱财或情绪失衡之处，先停一步，确认之后再答应。`,
      avoid:i % 3 === 0 ? "忌急求定论，忌反复试探。" : i % 3 === 1 ? "忌听偏信偏，忌情绪决策。" : "忌口头承诺过满，忌轻忽细节。",
      lucky:["东方","南方","西方","北方","近水处","明灯处"][i % 6],
      days:[3,7,9,14,21,28,49][i % 7]
    };
  });
}

function toast(text){
  const el = $("#toast");
  el.textContent = text;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2400);
}

function cleanQuestion(value){
  return (value || "").replace(/\s+/g, " ").trim().slice(0, 80);
}

function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, ch => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  })[ch]);
}

function syncQuestion(){
  state.customQuestion = cleanQuestion(customQuestion.value);
  customQuestion.value = state.customQuestion;
  questionCount.textContent = `${state.customQuestion.length}/80`;
  return state.customQuestion;
}

function typeLine(text, speed=34){
  clearTimeout(typeTimer);
  ritualLine.innerHTML = "";
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  ritualLine.appendChild(cursor);
  let i = 0;
  function step(){
    if(i < text.length){
      cursor.insertAdjacentText("beforebegin", text[i++]);
      typeTimer = setTimeout(step, speed);
    }else{
      typeTimer = setTimeout(() => cursor.remove(), 350);
    }
  }
  step();
}

function ac(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
  }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function tone(freq, dur=.38, delay=0, vol=.1, type="sine"){
  if(!soundOn) return;
  const ctx = ac();
  if(!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(ctx.destination);
  const t = ctx.currentTime + delay;
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(vol, t + .03);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.start(t);
  osc.stop(t + dur + .04);
}

const sfx = {
  bell(){tone(523,.9,0,.09);tone(784,1.2,.08,.07);tone(1046,1.4,.16,.04);},
  wood(){tone(196,.18,0,.13,"triangle");tone(262,.16,.03,.09,"square");},
  drop(){tone(330,.24,0,.11,"triangle");tone(660,.5,.06,.07);},
  soft(){tone(440,.34,0,.06);tone(660,.42,.08,.05);}
};

function playVideo(which){
  const map = {opening: openingVideo, climax: climaxVideo};
  Object.entries(map).forEach(([key, video]) => {
    if(key === which){
      video.classList.add("on");
      video.play().catch(() => {});
    }else{
      video.classList.remove("on");
      video.pause();
    }
  });
}

}

function hashText(text){
  let hash = 2166136261;
  for(let i = 0; i < text.length; i++){
    hash ^= text.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return hash >>> 0;
}

function rand32(){
  if(window.crypto && crypto.getRandomValues){
    const u = new Uint32Array(1);
    crypto.getRandomValues(u);
    return u[0];
  }
  return Math.floor(Math.random() * 4294967296);
}

function chooseSign(){
  const elapsed = Date.now() - state.startedAt;
  const dirIndex = Object.keys(DIRECTIONS).indexOf(state.direction) + 1;
  const raw = rand32() ^ Math.floor(elapsed) ^ Math.floor(state.resultSeed * 997) ^ (state.shakeCount * 131) ^ (dirIndex * 7919) ^ hashText(state.customQuestion);
  const idx = Math.abs(raw) % SIGNS.length;
  return SIGNS[idx];
}

function updateMeter(){
  const n = Math.max(0, Math.min(100, Math.round(state.meter)));

}

    "中吉":["先做小规模验证","把含糊约定写清楚","用一周时间观察反馈"],
    "小吉":["从最容易完成的小事开始","不要急着求最终答案","把心态放轻，积小胜"],
    "平":["暂缓重大决定","整理信息和关系边界","等一个更清楚的信号"],
    "末吉":["补漏比冲刺更重要","先处理旧问题","避免情绪化回复"],

  return gradeMap[sign.grade] || gradeMap["平"];

function handleShakePoint(x, y){
  if(state.stage !== "shake" || state.selectedSign) return;
  if(!state.lastPoint){
    state.lastPoint = {x,y};
    return;
  }
  const dx = x - state.lastPoint.x;
  const dy = y - state.lastPoint.y;
  const dist = Math.hypot(dx, dy);
  state.lastPoint = {x,y};
  if(dist < 5) return;
  state.shakeCount += 1;
  state.resultSeed += dist + Math.abs(dx) * 1.7 + Math.abs(dy) * .5;
  state.meter += Math.min(9, dist / 7);
  $("#tube").classList.add("shaking");
  if(state.shakeCount % 5 === 0) sfx.wood();
  updateMeter();
  if(state.meter >= 100) completeShake();
}

function initEvents(){
  document.addEventListener("click", e => {
    const target = e.target;
    if(target.closest("[data-ui]")){
      const dir = target.closest("[data-dir]");
      if(dir){
        state.direction = dir.dataset.dir;
        buildDirectionChips();
        sfx.soft();
        return;
      }
      const resultAct = target.closest("[data-result]");
      if(resultAct){
        const act = resultAct.dataset.result;
        if(act === "copy") copyResult();
        if(act === "again"){ resetHome(); requestAnimationFrame(toIntro); }
        if(act === "home") resetHome();
        return;
      }
      return;
    }
    if(state.stage === "home") toIntro();
  });

  $("#startPlaque").addEventListener("click", toIntro);
  customQuestion.addEventListener("input", updateQuestionCount);
  customQuestion.addEventListener("blur", syncQuestion);
  $("#projectBtn").addEventListener("click", e => {
    e.stopPropagation();
    $("#project").classList.toggle("open");
  });
  document.addEventListener("click", e => {
    if(!e.target.closest("#project")) $("#project").classList.remove("open");
  });
  $$("[data-soon]").forEach(btn => btn.addEventListener("click", () => toast(`「${btn.dataset.soon}」模块后续开放`)));
  $$("[data-nav]").forEach(btn => btn.addEventListener("click", () => {
    const nav = btn.dataset.nav;
    if(nav === "home") resetHome();
    else if(nav === "daily") toast($("#dailyText").textContent);
    else toast("该栏目后续接入完整内容");
  }));
  $$("[data-feature]").forEach(btn => btn.addEventListener("click", toIntro));
  $("#userBtn").addEventListener("click", () => toast("个人档案后续开放"));
  $("#soundBtn").addEventListener("click", () => {
    soundOn = !soundOn;
    $("#soundBtn").classList.toggle("off", !soundOn);
    toast(soundOn ? "音效已开启" : "音效已关闭");
  });
  $("#exitBtn").addEventListener("click", resetHome);
  $("#skipVideoBtn").addEventListener("click", () => {
    if(state.stage === "intro") toVow();
    else if(state.stage === "climax") showResult();
  });
  $("#continueBtn").addEventListener("click", () => {
    if(state.stage === "intro") toVow();
    else if(state.stage === "vow") toShake();
    else if(state.stage === "shake" && state.selectedSign) toClimax();
    else if(state.stage === "climax") showResult();
  });

  const tube = $("#tube");
  tube.addEventListener("pointerdown", e => {
    if(state.stage !== "shake") return;
    state.pointerActive = true;
    tube.setPointerCapture(e.pointerId);
    state.lastPoint = {x:e.clientX, y:e.clientY};
    tube.classList.add("shaking");
    sfx.wood();
  });
  tube.addEventListener("pointermove", e => {
    if(e.buttons || e.pressure > 0) handleShakePoint(e.clientX, e.clientY);
  });
  tube.addEventListener("pointerup", e => {
    state.lastPoint = null;
    state.pointerActive = false;
    if(!state.selectedSign) tube.classList.remove("shaking");
    try{ tube.releasePointerCapture(e.pointerId); }catch(err){}
  });
  tube.addEventListener("mousedown", e => {
    if(state.stage !== "shake" || state.pointerActive) return;
    state.mouseActive = true;
    state.lastPoint = {x:e.clientX, y:e.clientY};
    tube.classList.add("shaking");
    sfx.wood();
  });
  document.addEventListener("mousemove", e => {
    if(!state.mouseActive || state.pointerActive) return;
    handleShakePoint(e.clientX, e.clientY);
  });
  document.addEventListener("mouseup", () => {
    if(!state.mouseActive) return;
    state.mouseActive = false;
    state.lastPoint = null;
    if(!state.selectedSign) tube.classList.remove("shaking");
  });
  tube.addEventListener("keydown", e => {
    if(state.stage !== "shake") return;
    if(e.key === " " || e.key === "Enter" || e.key === "ArrowLeft" || e.key === "ArrowRight"){
      e.preventDefault();
      state.shakeCount += 1;
      state.resultSeed += rand32() % 500;
      state.meter += 6;
      tube.classList.add("shaking");
      sfx.wood();
      updateMeter();
      if(state.meter >= 100) completeShake();
      setTimeout(() => { if(!state.selectedSign) tube.classList.remove("shaking"); }, 220);
    }
  });
  document.addEventListener("keydown", e => {
    if(e.key === "Escape"){
      if(state.stage === "home") return;
      resetHome();
    }
  });
}

function initDaily(){
  const daySeed = new Date().getFullYear() * 10000 + (new Date().getMonth() + 1) * 100 + new Date().getDate();
  const sign = SIGNS[daySeed % SIGNS.length];
  $("#dailyText").textContent = `${sign.name}：${sign.tone}`;
}

openingVideo.addEventListener("error", () => toast("开场视频暂未加载，已切换静态仪式"));
climaxVideo.addEventListener("error", () => toast("高潮视频暂未加载，仍可查看签文"));

initDaily();
buildDirectionChips();
initEvents();
</script>
